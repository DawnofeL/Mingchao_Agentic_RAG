<script>
const SRC={'01':'#A8794F','02':'#5C8A82','03':'#5E7B54','04':'#897595','05':'#A87A82','06':'#6F88A0','00':'#7E7452'};
const SRCNAME={'01':'01 顶层路由','02':'02 People子图','03':'03 Timeline子图','04':'04 Orchestrator','05':'05 执行分支','06':'06 工具与校验基建','00':'00 总览'};
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

const REGIONS=[
  [60,   0,2380,280,'01','① 意图识别与顶层路由 · build.py + query_understanding.py',0],
  [60, 320,2380,280,'05','② 单任务执行分支入口 · route_task.py 并行 chunk 兜底',0],
  [60, 640,2380,280,'02','③ People 检索子图 · 三阶段工具调用 route_people.py',0],
  [60, 960,2380,280,'03','④ Timeline 检索子图 · 二阶段工具调用 route_timeline.py',0],

const NODES=[
  ['QU',700,150,'key',['01'],'qu 意图识别',['Query_Understanding_Node','JSON schema 校验 + 最多 3 次重试']],
  ['ROUTE',1500,150,'glass',['01'],'条件路由',['_Route_After_QU','按 task_type / intention 分流']],

SINGLE_DIRECT:`<p class="d-lead">_Single_Direct_Node（build.py:99-106）+ _Run_Direct（route_task.py:255-286）。三个分支里唯一不做检索的一个，直接基于对话历史回复。</p><h4>用在什么场景</h4><p>多轮对话里的追问，答案已经在前几轮给过，不需要重新查数据库。把 history 还原成 LLM message 序列，用 _DIRECT_PROMPT 约束模型只能复述、整理前文已经出现过的 [people_id]/[chunk_id] 引用，不允许编造新的引用锚点。</p>`,

ORCHESTRATE:`<p class="d-lead">_Orchestrate_Node（build.py:109-114），顶层图唯一进入编排子图的入口，只在 plan["task_type"]=="subtasks" 时触发，也就是用户的问题被 QU 拆成了多个互相依赖的子任务。</p><h4>为什么单独开一张子图</h4><p>多任务编排需要处理依赖关系（task B 依赖 task A 的结果）、指代还原（"他"指的是谁要等上游结果出来才能确定）、并行派发等单任务流程完全用不到的逻辑，独立成子图（详见 ⑤ Orchestrator 编排子图）让单任务路径保持简单。</p>`,

P_FIRST:`<p class="d-lead">route_people.py:247-280，三阶段工具调用的第一阶段。LLM 绑定 PEOPLE_TOOLS（people_search + relationships_search）自己选一个填参数。</p><h4>三条出路</h4><table><thead><tr><th>情况</th><th>处理</th></tr></thead><tbody><tr><td>native tool call 正常触发</td><td>取出 pending_tool，进 execute_tool</td></tr><tr><td>native tool call 没触发，但 content 里写了 JSON</td><td>走 TEXT_FALLBACK 文本降级解析，解析出来也按 pending_tool 处理</td></tr><tr><td>两者都没有，模型直接写了文字答案</td><td>result_kind=answer，过 CITE_VALIDATE 校验后直接 END</td></tr></tbody></table>`,

P_EXEC:`<p class="d-lead">route_people.py:283-301，真正执行第一阶段选中的工具。先过 SANITIZE 清洗参数，再调 _Execute_Tool。</p><h4>两件事</h4><p>① 把返回结果里的 people_id 收进 valid_ids 集合（_Ids_From_Result，194-220），这是后续答案引用校验的合法 id 池；② 用 _Clip 把结果截断到 90K 字符以内塞进 ToolMessage，防止单次工具结果把上下文撑爆。</p><h4>relationships_search 的特殊之处</h4><p>这个工具返回的是一个人物关系网，只有"主体自己"的 people_id 算合法引用，关系对象不算，避免答案里乱引一个只是"被提到"但没被验证过的人物 id。</p>`,

P_JUDGE:`<p class="d-lead">route_people.py:304-341，三阶段里的判断节点。第二次 LLM 调用，给它三个选择：直接给答案、换另一个工具重试、或者放弃挣扎触发 check_chunk 兜底。</p><h4>为什么不让它重复调第一个工具</h4><p>绑定的工具集去掉了刚才已经用过的那个，只剩"另一个工具 + check_chunk"，逼着模型要么换个角度查，要么承认查不到，不会在同一个工具上无意义重试。</p>`,

P_RETRY:`<p class="d-lead">route_people.py:344-361，judge 选了 retry 才会走到这里，执行第二个工具（比如第一次用了 people_search 没查到，换 relationships_search 试试）。同样收集 people_id 进 valid_ids，tool_round 标记为 2，方便日志区分这是第几次工具调用。</p>`,

P_FINAL:`<p class="d-lead">route_people.py:364-375，两个工具都已经用过了，最后一次 LLM 调用，只绑 check_chunk 这一个工具，模型只剩两个选项：给答案，或者承认查不到触发 fallback。三阶段在这里收口，不会再有第三次工具调用。</p>`,

P_PARTIAL:`<p class="d-lead">route_people.py:378-401，judge 或 final_judge 选了 check 时走到这里。工具有查到一些东西但模型觉得不足以完整回答，不是整个丢弃，而是调 _Generate_Partial（140-155）专门提一句提示词，让模型从已有工具结果里提取"能确认的部分"。</p><h4>三种返回</h4><table><thead><tr><th>result_kind</th><th>含义</th></tr></thead><tbody><tr><td>supplement</td><td>有部分确认内容，"__SUPPLEMENT__"+partial 返回上游，跟 chunk 检索结果合并</td></tr><tr><td>answer</td><td>partial 提取出来发现其实够完整，直接当完整答案</td></tr><tr><td>fallback</td><td>工具压根没查到东西，partial 也是空，返回 None 交给纯 chunk 兜底</td></tr></tbody></table>`,

T_FIRST:`<p class="d-lead">route_timeline.py:153-180，跟 People 的 first_call 几乎一样，只是绑定的工具换成 TIMELINE_TOOLS（只有 event_search + check_chunk）。LLM 选工具填参数，或者 native tool call 没触发时走 TEXT_FALLBACK 文本降级解析，或者直接给文字答案。</p>`,

T_EXEC:`<p class="d-lead">route_timeline.py:183-198，执行 event_search，收集返回结果里的 event_id 进 valid_ids。流程跟 People 的 execute_tool 对称，只是收集的 id 类型从 people_id 换成了 event_id。</p>`,

T_JUDGE:`<p class="d-lead">route_timeline.py:201-224，第二次 LLM 调用，只绑 check_chunk（因为 Timeline 没有第二个检索工具可换），两选一：answer 或 check。</p><h4>跟 People judge 的关键差异</h4><p>第 217-220 行有一处代码兜底：如果 LLM 这次返回了空响应（没工具调用也没文字），不等它继续纠结，代码直接把 result_kind 强制设成 fallback，跳过模型决策。People 子图没有这个强制，因为 People 还有 retry 这条路可以再给模型一次机会，Timeline 没有 retry，与其在空响应上耗着不如直接兜底。</p>`,

T_PARTIAL:`<p class="d-lead">route_timeline.py:227-240，跟 People 的 make_partial 逻辑一致：调 _Generate_Partial 提取已确认部分，三选 supplement/answer/fallback。Timeline 子图整体比 People 少一层（没有 retry → final_judge 这一段），因为只有一个检索工具，没法"换一个再试"。</p>`,

O_NODE:`<p class="d-lead">orchestrator.py:49-124，编排子图的核心调度节点，每一轮都会回到这里重新判断。</p><h4>三件事</h4><p>① 从 pending 里挑出"依赖全部已在 pool 里"的 ready 任务；② 对每个 ready 任务调 O_RESOLVE 做指代还原；③ 没法解析的（依赖结果还没来）写一条阻塞结果进 pool，等下一轮。</p><h4>死锁检测（行 71）</h4><p>如果 pending 非空但一个 ready 任务都凑不出来（所有任务都在互相等对方），判定死锁，直接把 route 设成 synthesize，让 O_SYNTH 对这些阻塞任务统一走拒答文案，不会无限空转。</p>`,

O_RESOLVE:`<p class="d-lead">_Resolve_References（orchestrator.py:224-266）+ _Parse_Resolved（269-286）。下游任务里常有"他"、"这件事"这类指代，需要等上游任务的结果出来才能还原成具体的人名/事件。</p><h4>三种返回</h4><table><thead><tr><th>返回</th><th>含义</th></tr></thead><tbody><tr><td>[]</td><td>还原不出来，本轮继续阻塞</td></tr><tr><td>[text]</td><td>正常还原成 1 条具体任务</td></tr><tr><td>[t1,t2,...]</td><td>枚举增生：上游结果是个列表（比如"列出的这几个人"），下游任务按每个枚举值各拆一条</td></tr></tbody></table><p>_Parse_Resolved 负责容错：LLM 输出的 JSON 格式不规范时，先试直接 json.loads，失败了用正则抠出 {...} 再解析一次。</p>`,

O_WORKER:`<p class="d-lead">orchestrator.py:127-139，通过 LangGraph 的 Send 机制并行执行 O_NODE 本轮算出的所有 job。每个 worker 按任务的 intention 转发给 _Run_People / _Run_Timeline / _Run_Direct（route_task.py 同一套函数，单任务分支和编排子图复用）。</p><h4>结果写回</h4><p>每个 worker 返回 {"pool": {task_id: [TaskResult]}}，多个 worker 并行写同一个 pool 字段，靠 STATE_MERGE 的 merge_pool reducer 按 task_id 拼接，不会互相覆盖。</p>`,

O_SYNTH:`<p class="d-lead">orchestrator.py:142-147 + _Synthesize_Final_Answer（320-363）。所有任务都进了 pool（或判定死锁）之后，读 pool 里全部子任务结果，按 task_id 排序，区分阻塞任务和有效结果，调 LLM 把多个子答案整合成一条最终回答。</p><h4>二次引用校验</h4><p>合成后的答案要逐字段过 CITE_VALIDATE：people_id / event_id / chunk_id 各自比对，引用的 id 必须是 pool 里某个子任务答案已经出现过的，不能是 LLM 在整合时凑出来的新 id，否则视为不合法引用，改写成拒答文案。</p>`,

TOOL_PEOPLE:`<p class="d-lead">people_tools.py，people_search / relationships_search / check_chunk 三个 @tool 函数的参数定义与枚举约束。</p><h4>枚举字段</h4><table><thead><tr><th>工具</th><th>字段</th><th>约束</th></tr></thead><tbody><tr><td>people_search</td><td>entities</td><td>人名/别名/职衔列表，无锚点传 []</td></tr><tr><td></td><td>era_filter</td><td>固定年号枚举（洪武/建文/永乐...），无约束传 null</td></tr><tr><td></td><td>primary_filter</td><td>身份大类枚举（皇帝/文臣/武将...），无约束传 null</td></tr><tr><td>relationships_search</td><td>person</td><td>主体人名（必填）</td></tr><tr><td></td><td>target</td><td>关系目标，无约束传 null</td></tr></tbody></table><p>枚举值的硬约束实际落在存储后端（people_store.py），工具函数本身只转发参数，不做校验，校验交给 SANITIZE 和存储层。</p>`,

TOOL_TIMELINE:`<p class="d-lead">timeline_tools.py，event_search 一个工具的参数定义。</p><h4>枚举字段</h4><table><thead><tr><th>字段</th><th>约束</th></tr></thead><tbody><tr><td>event_keywords</td><td>事件名/术语/地名列表，无锚点传 []</td></tr><tr><td>era</td><td>固定年号枚举，无约束传 null</td></tr><tr><td>year</td><td>公元年整数列表（精确匹配），无约束传 null</td></tr><tr><td>participants</td><td>人名列表，无锚点传 []</td></tr></tbody></table>`,

SANITIZE:`<p class="d-lead">_Sanitize_Args，route_people.py:58-98 和 route_timeline.py:54-70 各有一份（逻辑一致，列表字段名不同）。LLM 填的工具参数格式经常不规整，执行前统一清洗一遍。</p><h4>清洗规则</h4><table><thead><tr><th>情况</th><th>处理</th></tr></thead><tbody><tr><td>空字符串或 null</td><td>统一变成 None，当作"没填"</td></tr><tr><td>该是列表的字段传成了 JSON 字符串</td><td>反序列化，失败就当单值包一层 []</td></tr><tr><td>该是列表的字段传成了单个值</td><td>包一层 []</td></tr><tr><td>普通字符串两端多余的引号</td><td>strip 掉</td></tr></tbody></table>`,

TEXT_FALLBACK:`<p class="d-lead">_Parse_Text_Tool_Call，route_people.py:158-178。bind_tools 之后模型理论上该把调用意图放进 response.tool_calls 这个结构化字段，但训练侧的保证不是绝对的，偶尔会把调用意图写成一段 JSON 文本塞进 response.content 而不触发 native tool call。这个函数就是兜这个底：从纯文本里尝试解析出工具名和参数，按 pending_tool 一样的格式交给后续流程处理，对上游而言这条路径"看起来"跟 native tool call 没有区别。</p>`,

CITE_EXTRACT:`<p class="d-lead">Extract_Cited_Ids，citation_check.py:16-44。用正则 \\[(people_id|event_id|chunk_id)=([\\d,\\s]+)\\] 从答案文本里抠出所有引用 id，兼容逗号并列写法（比如 [chunk_id=10,12] 解析成 {10,12}），返回一个 id 集合。</p>`,

CITE_VALIDATE:`<p class="d-lead">Validate_Citations，citation_check.py:47-67。调 CITE_EXTRACT 拿到答案里实际引用的 id，跟传入的 valid_ids（合法证据池）求差集，差集非空说明答案引用了证据池里不存在的 id，返回错误描述；差集为空返回 None 表示通过。</p><h4>谁在用</h4><p>这是一个纯校验函数，自己不决定怎么处理，调用方拿到错误描述后各自决定怎么改写。People/Timeline 子图里每一个答案出口（first_call 直接答案、judge/final_judge 的 answer、make_partial 的 supplement）都会过一次；Orchestrator 的 synthesize 在最后再做一次逐字段的二次校验，确保最终答案的引用都来自子任务答案里真实出现过的证据。</p>`,

STATE_MERGE:`<p class="d-lead">merge_pool reducer，state.py:54-84。挂在 OrchestratorState.pool 字段的 Annotated reducer。LangGraph 默认同一个字段被多次写入时后者覆盖前者，多个 worker 并行执行、各自往 pool 写自己的 task_id 结果，如果用默认行为，先写完的 worker 的结果会被后写完的覆盖丢失。这个 reducer 改成按 task_id 拼接：left={"t1":[A]} + right={"t2":[B]} → {"t1":[A],"t2":[B]}，保证并发写入不丢数据。</p>`,
};

function L(id){return `<span class="ov-link" data-id="${id}">${id}</span>`;}
function mdToHtml(md){
  const lines=md.split('\n');let html='';let inList=false;let para=[];
  const inline=s=>s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  const flushPara=()=>{if(para.length){html+=`<p>${para.join(' ')}</p>`;para=[];}};
  const closeList=()=>{if(inList){html+='</ul>';inList=false;}};
  for(const raw of lines){
    const line=raw.trim();let m;
    if(line===''){flushPara();continue;}
    if(line==='---'){flushPara();closeList();html+='<hr>';continue;}
    if(m=line.match(/^###\s+(.*)/)){flushPara();closeList();html+=`<h3>${inline(m[1])}</h3>`;continue;}
    if(m=line.match(/^>\s*\*\*(.*)\*\*$/)){flushPara();closeList();html+=`<div class="ov-sub">${inline(m[1])}</div>`;continue;}
    if(m=line.match(/^-\s+(.*)/)){flushPara();if(!inList){html+='<ul>';inList=true;}html+=`<li>${inline(m[1])}</li>`;continue;}
    closeList();para.push(inline(line));
  }
  flushPara();closeList();return html;
}

overview:{name:'线程总览',nodes:[],md:`
这张图还原的是「明朝那些事儿 Agentic RAG」这个 LangGraph 项目内部真实的图结构：顶层路由怎么分流，三种检索方式（People / Timeline / Orchestrator 多任务编排）各自怎么走，以及贯穿所有子图的工具参数清洗和引用校验机制。

整套图按职责拆成 **5 条线**，左侧面板可以单独点开任意一条：流程图会只保留这条线相关的节点，其它节点淡出，方便聚焦看一条线的来龙去脉。

---

> **顶层路由线**

用户问题先过意图识别节点，解析成结构化计划，再按 task_type 和 intention 分流到四个分支之一：People 检索、Timeline 检索、直接回复、或多任务编排。

> **People 子图线**

人物相关问题走的三阶段工具调用：选工具填参数 → 执行 → 判断要不要换个工具重试 → 再判断一次 → 提取部分答案兜底。

> **Timeline 子图线**

事件相关问题走的二阶段工具调用，结构跟 People 子图类似但少了重试这一环，因为只有一个检索工具。

> **Orchestrator 编排线**

多个互相依赖的子任务时走的调度循环：挑出能跑的任务、指代还原、并行派发、合并结果，直到所有任务跑完或判定死锁，最后合成一条总答案。

> **工具与校验基建**

不是一条会跑的流程线，是上面几条线共用的地基：工具参数枚举定义在哪、LLM 输出的参数怎么清洗、答案里的引用锚点怎么校验、并行写入怎么不丢数据。
`},

toproute:{name:'顶层路由线',nodes:['QU','ROUTE','SINGLE_PEOPLE','SINGLE_TIMELINE','SINGLE_DIRECT','ORCHESTRATE'],md:`
用户问题进图的起点（${L('QU')}），意图识别节点把原始问题和历史对话一起喂给 LLM，解析成结构化计划：要不要拆成多个子任务，每个任务的意图分类是 people / timeline / direct。

> **JSON 输出怎么保证靠得住**

解析结果不是直接信任，过一道 schema 校验：task_type 只能是 single 或 subtasks，task_id 必须连续编号，依赖关系必须指向已经出现过的任务。校验不过就把错误信息原样塞回去让模型自己改，最多重试 3 次，3 次都不过才放弃，这是这个项目里"自我修正"做得最完整的一处。

---

> **按计划分流（${L('ROUTE')}）**

task_type 是 subtasks，直接进编排子图（${L('ORCHESTRATE')}）；是 single，就看这一个任务的 intention 字段，三选一分流到 ${L('SINGLE_PEOPLE')} / ${L('SINGLE_TIMELINE')} / ${L('SINGLE_DIRECT')}。

顶层图本身很浅，只做一次路由判断，真正的复杂逻辑全部下沉到各自的子图，这样每个分支可以独立演进，互不牵连。
`},

people:{name:'People 子图线',nodes:['P_FIRST','P_EXEC','P_JUDGE','P_RETRY','P_FINAL','P_PARTIAL'],md:`
人物相关的问题（比如"谁是朱棣的谋士"）会进到 People 子图，这是一套**三阶段**工具调用流程，专门为"有两个互补检索工具、查不到可以换一个再试"这种场景设计。

> **第一阶段：选工具（${L('P_FIRST')}）**

LLM 绑定 people_search + relationships_search 两个工具，自己挑一个填参数。如果 native tool call 没触发但模型把调用意图写成了文本 JSON，会走一道降级解析兜底；如果模型压根没打算用工具、直接给了文字答案，校验完引用直接结束，不进入后面的阶段。

> **执行 + 判断（${L('P_EXEC')} → ${L('P_JUDGE')}）**

选中的工具真正执行，把结果里的合法人物 id 收进一个集合，作为后续答案引用校验的依据。接着第二次 LLM 调用，三选一：直接给答案、换另一个工具重试、或者放弃挣扎走兜底。绑定的工具去掉了刚用过的那个，逼着模型要么换角度查要么承认查不到。

---

> **第二阶段：重试（${L('P_RETRY')} → ${L('P_FINAL')}）**

选了重试，执行第二个工具，再来一次判断，但这次只能给答案或兜底，两个工具都用过了，三阶段在这里收口。

> **兜底：提取部分答案（${L('P_PARTIAL')}）**

工具查到了一些东西但不足以完整回答时，不是整个丢弃，专门提一句提示词让模型从已有结果里提取"能确认的部分"，跟后面 chunk 检索的结果合并使用，没有白费已经查到的信息。
`},

timeline:{name:'Timeline 子图线',nodes:['T_FIRST','T_EXEC','T_JUDGE','T_PARTIAL'],md:`
事件相关的问题（比如"靖难之役发生在哪一年"）走 Timeline 子图，结构跟 People 子图类似，但是**二阶段**而不是三阶段。

> **为什么少一阶段**

People 子图有两个互补工具，查不到可以换一个再试。Timeline 子图只有 event_search 一个检索工具，没有"换工具重试"这条路可走，所以整张子图天然比 People 少了 retry → final_judge 这一段。

> **第一阶段：选工具（${L('T_FIRST')}）**

绑定 event_search + check_chunk，跟 People 一样支持 native tool call 失败后的文本降级解析，也支持模型直接给文字答案的快速路径。

> **执行 + 判断（${L('T_EXEC')} → ${L('T_JUDGE')}）**

执行 event_search 收集合法事件 id，第二次 LLM 调用只能在 answer 和 check 之间选。这里有一处比 People 更强硬的代码兜底：如果模型这次返回了空响应，不等它继续纠结，代码直接强制走 fallback，不浪费一轮判断。

---

> **兜底：提取部分答案（${L('T_PARTIAL')}）**

跟 People 的 make_partial 逻辑一致，提取已确认部分，三选 supplement / answer / fallback。
`},

orchestrator:{name:'Orchestrator 编排线',nodes:['O_NODE','O_RESOLVE','O_WORKER','O_SYNTH'],md:`
用户的问题被意图识别拆成多个互相依赖的子任务时（比如"先查 A 是谁，再查 A 和 B 的关系"），会进到这张有环的编排子图。

> **调度核心：每轮都回这里（${L('O_NODE')}）**

从待办任务里挑出依赖已经全部满足的"ready 任务"，没法满足依赖的写一条阻塞结果占位，等下一轮。如果某一轮发现一个 ready 任务都凑不出来（所有任务在互相等对方），判定死锁，直接转去合成阶段，不会无限空转。

> **指代还原（${L('O_RESOLVE')}）**

下游任务里常有"他"、"这件事"这类指代，要等上游任务结果出来才能还原成具体对象。还原结果可能是空（继续阻塞）、一条具体任务，或者枚举增生成多条（比如上游结果是个列表，下游按每一项各拆一条任务）。

---

> **并行执行（${L('O_WORKER')}）**

本轮算出的所有任务通过 Send 机制并行派发，每个 worker 按任务的意图转发给 People / Timeline / Direct 对应的执行函数，结果写回结果池，多个 worker 并发写入靠专门的 reducer 按任务 id 拼接，不会互相覆盖。

> **合成总答案（${L('O_SYNTH')}）**

所有任务跑完（或判定死锁）之后，读结果池里全部子任务答案，合成一条总回答，并且对最终答案里的每一类引用锚点（人物/事件/原文片段）做二次校验，确保引用的都是子任务答案里真实出现过的证据，不是合成时凑出来的。
`},

infra:{name:'工具与校验基建',nodes:['TOOL_PEOPLE','TOOL_TIMELINE','SANITIZE','TEXT_FALLBACK','CITE_EXTRACT','CITE_VALIDATE','STATE_MERGE'],md:`
这条线不是一条会跑的流程线，是 People、Timeline、Orchestrator 三条子图共用的地基：工具长什么样、参数怎么清洗、答案里的引用怎么校验、并行写入怎么不丢数据。

> **工具参数枚举**

People 工具（${L('TOOL_PEOPLE')}）和 Timeline 工具（${L('TOOL_TIMELINE')}）分别在各自的 tools 文件里定义参数和枚举约束，比如年号、身份大类这些字段都有固定的取值范围，没有约束的字段约定传 null 或空列表。

> **参数清洗（${L('SANITIZE')}）**

LLM 填的参数格式经常不规整：该传 null 的传了空字符串，该传列表的传了单个值或 JSON 字符串。两个子图各自有一份清洗函数，逻辑一致，在工具真正执行前统一处理掉这些不规整的情况。

---

> **文本降级解析（${L('TEXT_FALLBACK')}）**

native tool call 是预期中的结构化调用通道，但训练侧的保证不是绝对的，模型偶尔会把调用意图写成纯文本 JSON 塞进内容字段而不触发 native 机制。两个子图的第一阶段都有一道兜底，从文本里尝试解析出工具名和参数。

> **引用锚点校验（${L('CITE_EXTRACT')} → ${L('CITE_VALIDATE')}）**

答案里的 [people_id=..] / [event_id=..] / [chunk_id=..] 这类引用锚点，每个答案出口都要校验一遍：抠出实际引用的 id，跟当前合法的证据池求差集，引用了证据池之外的 id 就视为不合法，改写成拒答文案。Orchestrator 合成最终答案时还会再做一次逐字段的二次校验。

> **并行写入不丢数据（${L('STATE_MERGE')}）**

Orchestrator 的多个 worker 并行执行，结果都要写进同一个结果池字段。LangGraph 默认同字段多次写入后者覆盖前者，专门的 reducer 把这个行为改成按任务 id 拼接，保证并发写入不会互相覆盖丢失结果。
`},
};

function openThreadDrawer(key){
  const t=THREADS[key];if(!t)return;
  document.getElementById('d-chips').innerHTML='';
  document.getElementById('d-title').textContent=t.name;
  document.getElementById('d-sub').textContent=key==='overview'?'共 5 条线':`${t.nodes.length} 个节点`;
  document.getElementById('d-body').innerHTML=`<div class="ov-body">${mdToHtml(t.md)}</div>`;
  document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('.tp-item.active,.tp-head.active').forEach(el=>el.classList.remove('active'));
  const btn=document.querySelector(`[data-thread="${key}"]`);if(btn)btn.classList.add('active');
  if(t.nodes.length)highlightSet(t.nodes);else clearHL();
  drawer.classList.add('open');
}
document.querySelectorAll('#threadPanel [data-thread]').forEach(el=>{
  el.addEventListener('click',()=>openThreadDrawer(el.dataset.thread));
});
document.getElementById('d-body').addEventListener('click',e=>{
  const t=e.target.closest('.ov-link');if(!t)return;
  closeDrawer();openDrawer(t.dataset.id);
});
</script>
