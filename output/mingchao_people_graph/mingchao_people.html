候万贵妃，凭借服务和逢迎获得万贵妃推荐，逐渐接近朱见深。成化朝五派格局中，汪直代表监派内部的新兴西监力量，与尚铭掌握的东厂传统势力形成竞争。\n \n汪直在成化十三年获朱见深许可创办西厂，试图以比东厂更酷烈的特务手段压过尚铭。汪直为树立威信先整治覃力鹏，又迫害杨晔、杨泰等人，杨晔死于狱中，引发商辂等文臣强烈反击。商辂上奏废除西厂后，朱见深一度罢免汪直，但不久又重新启用。汪直随后试图以边功证明自己，却通过杀使者、挑衅边部制造边患，最终在尚铭和李孜省联手攻击下被贬南京，再被贬为奉御，退出成化权力中心。"}, "张敏": {"aliases": [], "identity": "宦官", "secondary_identity": ["门监"], "era": ["成化"], "roles": ["朱祐樘保护者", "皇子真相揭示者"], "relationships": [{"type": "救护", "target": "朱祐樘", "context": "张敏违抗万贵妃溺杀命令，抱走朱祐樘并秘密抚养五年"}, {"type": "保护", "target": "纪妃", "context": "张敏没有执行万贵妃对纪妃之子的杀害命令，使纪妃母子暂时保全"}, {"type": "告知", "target": "朱见深", "context": "成化十一年为朱见深梳头时冒死告知朱见深已有皇子"}], "events": ["朱祐樘出生并被张敏藏养", "张敏揭示皇子身份", "纪妃遇害与张敏自尽"], "source_chunks": [518, 519, 520, 521, 522], "summary": "张敏是成化后宫中的普通门监宦官。成化六年，张敏奉万贵妃之命前往纪妃住处溺杀新生皇子，却选择违抗命令，将朱祐樘抱走并与宫女宦官共同秘密抚养。五年后，张敏在朱见深感叹无子时说出朱祐樘存在，并以必死之身换取朱祐樘得到朱见深承认。朱祐樘身份暴露后，纪妃很快去世，张敏也在数日后吞金自尽。张敏以自身死亡保护朱祐樘，是成化后宫中舍生取义的关键人物。"}, "梁芳": {"aliases": [], "identity": "宦官", "secondary_identity": ["万贵妃采购员", "春派掌门"], "era": ["成化", "弘治"], "roles": ["春派掌门", "后派附属宦官", "内藏挥霍者", "废储推动者", "弘治初被清算者"], "relationships": [{"type": "依附", "target": "万贵妃", "context": "梁芳原为万贵妃采购物品，凭借送礼和逢迎成为后派附属势力"}, {"type": "提携", "target": "李孜省", "context": "梁芳在行骗与炼丹事务中赏识李孜省，支持李孜省另立仙派"}, {"type": "讨好", "target": "朱见深", "context": "梁芳通过制造春药和提供物品讨好朱见深，获得成化朝宠信"}, {"type": "激怒", "target": "朱见深", "context": "梁芳耗空朱见深内藏库，却以修宫殿祠堂祈福为由推脱责任"}, {"type": "同谋", "target": "万贵妃", "context": "梁芳将朱见深责备理解为朱祐樘日后清算威胁，遂联络万贵妃推动废太子"}, {"type": "被清算", "target": "朱祐樘", "context": "朱祐樘继位后将梁芳下狱，使梁芳受到应得惩罚"}], "events": ["成化五派形成", "怀恩拒废太子", "朱祐樘继位清算五派"], "source_chunks": [524, 525, 526, 535, 536, 538], "summary": "梁芳是成化朝得势宦官，原为万贵妃采购物品，因胆大心黑、中饱私囊而受万贵妃重用。梁芳通过向万贵妃送礼、向朱见深进献春药两面讨好，成为成化五派中的春派掌门。梁芳还招揽并提携李孜省，使李孜省从随从发展为修道炼丹的仙派掌门。\n \n梁芳在成化后期继续挥霍朱见深内藏库财物。成化二十一年，朱见深发现内藏库空虚并责问梁芳，梁芳以修宫殿祠堂祈福为由推脱，朱见深只留下将来自有人算账的软弱威胁。梁芳担心朱祐樘继位后清算，遂联络万贵妃推动废太子。朱祐樘继位后，梁芳被迅速下狱，春派势力随之结束。"}, "李孜省": {"aliases": [], "identity": "社会人员", "secondary_identity": ["方士", "术士"], "era": ["成化", "弘治"], "roles": ["仙派掌门", "朱见深炼丹宠臣", "汪直倒台推动者", "弘治初被清算者"], "relationships": [{"type": "受提携", "target": "梁芳", "context": "李孜省最初跟随梁芳，得到梁芳支持后另立仙派并为朱见深炼丹修道"}, {"type": "宠臣", "target": "朱见深", "context": "李孜省以长生修道和炼丹迎合朱见深求寿心理，成为朱见深重视的宠臣"}, {"type": "竞争", "target": "尚铭", "context": "李孜省试图组织人员刺探消息，触动尚铭等监派宦官的特务垄断"}, {"type": "合作", "target": "尚铭", "context": "李孜省与尚铭暂时合作，借边衅和弹劾攻势打倒汪直"}, {"type": "利用", "target": "万安", "context": "李孜省串通万安上书攻击汪直，并借关系帮助万安、刘吉、彭华入阁"}, {"type": "被清算", "target": "朱祐樘", "context": "朱祐樘继位后迅速处置李孜省及其门徒，终结仙派权势"}], "events": ["成化五派形成", "汪直边衅失宠", "尚铭被罢与怀恩掌监派", "朱祐樘继位清算五派"], "source_chunks": [524, 525, 526, 533, 534, 535, 536, 538], "summary": "李孜省原在江西衙门任小吏，后来到京城行骗并依附梁芳。梁芳赏识李孜省后，李孜省以炼丹、修道和长生不老之术迎合朱见深，成为成化五派中的仙派掌门。李孜省在炼丹之外还制造春药、安插亲信，并试图染指特务工作，逐渐与尚铭、汪直等监派人物发生冲突。\n \n李孜省在成化后期继续以修道炼丹和安插亲信受宠。李孜省与尚铭暂时合作，利用朱见深对汪直挑起边衅的不满，串通万安等人发动弹劾，使汪直被贬。汪直倒台后，李孜省立即转向攻击尚铭，使尚铭也被罢免。弘治初年，朱祐樘继位第六天即处置李孜省，驱逐仙派门徒，李孜省被充军后很快被仇人整死。"}, "尚铭": {"aliases": [], "identity": "宦官", "secondary_identity": ["东厂掌印太监"], "era": ["成化"], "roles": ["东厂掌印", "东监派掌门", "汪直政敌", "监派旧势力"], "relationships": [{"type": "竞争", "target": "汪直", "context": "尚铭掌握东厂，汪直创办西厂后与尚铭形成东西厂权力竞争"}, {"type": "冲突", "target": "李孜省", "context": "李孜省试图插手刺探消息，触动尚铭掌控的特务体系"}, {"type": "合作", "target": "李孜省", "context": "尚铭与李孜省合作搜集汪直罪证，并推动汪直失宠被贬"}, {"type": "被取代", "target": "怀恩", "context": "尚铭被弹劾罢免后，怀恩趁机通过亲信陈准掌握东厂大权"}], "events": ["成化五派形成", "西厂设立", "汪直边衅失宠", "尚铭被罢与怀恩掌监派"], "source_chunks": [524, 525, 526, 529, 530, 533, 534], "summary": "尚铭是成化朝东厂掌印太监，在五派格局中代表监派传统势力。尚铭资历深厚，掌控东厂刺探情报和打击政敌，又以绑票敲诈富户扩充财源。汪直试图夺取东厂控制权未成后，尚铭与汪直形成东厂、西厂之间的长期竞争。\n \n尚铭是成化朝东厂掌印太监，资历深厚且行事谨慎。汪直夺取东厂控制权未成后创办西厂，尚铭由此与汪直形成东西厂竞争。成化十七年，尚铭与李孜省利用朱见深对汪直边衅的不满，合力弹劾汪直并使汪直被贬。汪直倒台后，尚铭本可统一监派，却很快遭李孜省准备的后手弹劾，被发往明孝陵扫地，监派权力最终落入怀恩手中。"}, "万安": {"aliases": ["万岁阁老"], "identity": "文臣", "secondary_identity": ["内阁首辅"], "era": ["成化", "弘治"], "roles": ["混派掌门", "成化内阁首辅", "成化首辅", "弘治初被逐者"], "relationships": [{"type": "依附", "target": "万贵妃", "context": "万安主动攀附万贵妃亲属关系，借后派影响取得升迁机会"}, {"type": "同僚", "target": "刘吉", "context": "刘吉与万安同属成化混派内阁成员，均以混日子和逃避政务著称"}, {"type": "同僚", "target": "商辂", "context": "万安入阁后与商辂同在内阁，但政治品格和理政能力相差甚远"}, {"type": "同党", "target": "刘吉", "context": "万安与刘吉同属混派阁臣，弘治初先后被朱祐樘逼退"}, {"type": "被驱逐", "target": "怀恩", "context": "朱祐樘授意怀恩以淫书和弹劾奏章逼迫万安离职"}, {"type": "依附", "target": "李孜省", "context": "万安等混派成员靠李孜省关系进入或维持内阁地位"}], "events": ["万安成为内阁首辅", "成化五派形成", "汪直边衅失宠", "万安被逐与混派瓦解"], "source_chunks": [524, 525, 526, 527, 528, 533, 535, 536, 539], "summary": "万安是四川眉州人，正统十三年进士，成化年间入阁。万安入阁后不理政务，专心攀附关系，甚至以牵强亲戚关系投靠万贵妃家族。成化十四年商辂退休后，万安成为内阁首辅，成化文官集团由此进入以混日子、磕头和拍马为特征的混派时代。成化七年，万安在廷议刚开始时便高呼万岁结束议事，因而得号“万岁阁老”。\n \n万安在成化后期继续以混派首领身份占据内阁首辅位置，并与李孜省等人合作攻击汪直。朱祐樘继位后暂时没有立刻处理混派，后来在朱见深遗物中发现万安所进淫书，又结合弹劾奏章命怀恩传达去职压力。万安起初只磕头认罪而不愿辞职，最终被怀恩扯掉牙牌驱逐，混派由此瓦解。"}, "商辂": {"aliases": [], "identity": "文臣", "secondary_identity": ["内阁首辅", "三元及第"], "era": ["正统", "成化"], "roles": ["成化前期阁臣", "清正内阁领袖", "废西厂奏疏主导者", "成化清正阁臣"], "relationships": [{"type": "同僚", "target": "彭时", "context": "商辂与彭时在成化前期共同主持内阁，使帝国政务有条不紊"}, {"type": "前后任", "target": "万安", "context": "商辂退休后万安成为内阁首辅，内阁由清正转入混派时代"}, {"type": "弹劾", "target": "汪直", "context": "商辂查明杨晔冤情后上奏要求废除西厂并罢免汪直"}, {"type": "协作", "target": "怀恩", "context": "怀恩传旨追问奏疏主谋时，商辂当面承担责任，怀恩转述后促成朱见深改变主意"}], "events": ["万安成为内阁首辅", "商辂奏罢西厂"], "source_chunks": [526, 527, 528, 531, 532, 535], "summary": "商辂是明代少见的连中三元者，早年在北京保卫战时支持于谦主张。成化前期，商辂与彭时主持内阁，保持朝政基本运转。成化十四年商辂退休后，万安成为内阁首辅，文官集团逐渐滑入混派时代，商辂也成为成化前期清正阁臣与后期混乱政局的分界人物。\n \n商辂在汪直西厂迫害杨晔后查明冤情，召集内阁痛斥汪直，并上奏要求废除西厂、罢免汪直。朱见深震怒后命怀恩追问主谋，商辂在怀恩面前公开承担奏疏责任，并指出汪直擅杀官员、调动边将和内宫人员将导致天下大乱。怀恩转述商辂意见后，朱见深意识到汪直威胁并罢免西厂。商辂后来心灰意冷退休，但与怀恩共同支撑了成化后期残存的正气。"}, "刘吉": {"aliases": ["刘棉花"], "identity": "文臣", "secondary_identity": ["内阁阁臣"], "era": ["成化", "弘治"], "roles": ["混派大弟子", "成化阁臣", "混派阁臣", "弘治初被逐者"], "relationships": [{"type": "同僚", "target": "万安", "context": "刘吉与万安同为成化混派阁臣，因不怕弹劾而被称为刘棉花"}, {"type": "同党", "target": "万安", "context": "刘吉与万安同属混派，万安被逐后刘吉试图变脸保位"}, {"type": "被逐", "target": "朱祐樘", "context": "朱祐樘识破刘吉本性，派太监警告刘吉退休，否则将严厉处置"}], "events": ["成化五派形成", "万安被逐与混派瓦解"], "source_chunks": [526, 528, 539, 540], "summary": "刘吉是河北人，正统十三年进士，成化十一年进入内阁。刘吉品行与万安相近，却更能承受言官弹劾，因弹劾打不动而得外号“刘棉花”。刘吉在成化混派中是万安之外的重要成员，代表成化内阁混日子和逃避责任的一面。\n \n刘吉在成化后期是混派内阁重要成员，以脸皮厚、不怕弹劾得号“刘棉花”。弘治初年万安被逐后，刘吉试图换上直言进谏的新面孔继续留任，甚至借外戚封官问题挑朱祐樘的毛病。朱祐樘早已掌握刘吉言行，派太监警告刘吉尽早退休，刘吉随即离职回乡，混派彻底瓦解。"}, "杨晔": {"aliases": [], "identity": "文臣", "secondary_identity": ["杨荣后裔"], "era": ["成化"], "roles": ["西厂冤案受害者"], "relationships": [{"type": "受迫害", "target": "汪直", "context": "汪直为西厂树威逮捕杨晔，并以弹琵琶酷刑折磨杨晔致死"}, {"type": "被申冤", "target": "商辂", "context": "商辂查明杨晔冤情后上奏要求废除西厂和罢免汪直"}], "events": ["商辂奏罢西厂"], "source_chunks": [531, 532], "summary": "杨晔是杨荣后裔，成化年间因家事与父亲杨泰暂住京城。汪直为树立西厂威信，逮捕杨晔及杨泰，并在狱中对杨晔施以酷刑“弹琵琶”，导致杨晔死于狱中。杨晔冤案激怒文官集团，商辂查明真相后上奏要求废除西厂，成为汪直首次失势的直接导火索。"}, "怀恩": {"aliases": ["戴怀恩"], "identity": "宦官", "secondary_identity": ["司礼太监"], "era": ["成化", "弘治"], "roles": ["司礼太监", "朱祐樘保护者", "东厂重整者"], "relationships": [{"type": "传旨", "target": "商辂", "context": "怀恩奉朱见深命追问废西厂奏疏主谋，却冷静转述商辂意见促成汪直被罢"}, {"type": "保护", "target": "朱祐樘", "context": "怀恩拒绝执行废太子命令，宁愿被杀也不愿陷害朱祐樘"}, {"type": "取代", "target": "尚铭", "context": "尚铭倒台后怀恩安排亲信掌东厂，使监派权力转入较为稳健的一方"}, {"type": "驱逐", "target": "万安", "context": "弘治初怀恩受朱祐樘之命，以奏章和牙牌逼万安离职"}], "events": ["商辂奏罢西厂", "尚铭被罢与怀恩掌监派", "怀恩拒废太子", "朱祐樘继位清算五派", "万安被逐与混派瓦解"], "source_chunks": [532, 534, 535, 536, 538, 539], "summary": "怀恩本姓戴，因父亲涉罪被迫入宫为宦官，后成为成化朝司礼太监。汪直西厂案中，怀恩奉命追问商辂，却将商辂反对汪直的意见如实转达给朱见深，帮助罢免西厂。尚铭倒台后，怀恩安排亲信掌东厂，保留监派中相对稳健的力量。成化二十一年，朱见深欲废朱祐樘，怀恩脱帽叩首，以死拒绝执行废储命令，被贬凤阳守灵。朱祐樘继位后，怀恩被召回复职并受礼遇，又奉命逼退万安，是成化末至弘治初保护朱祐樘和整顿政局的关键宦官。"}, "王恕": {"aliases": [], "identity": "文臣", "secondary_identity": ["吏部尚书"], "era": ["成化", "弘治"], "roles": ["弘治吏部尚书", "吏治整顿者", "敢言重臣"], "relationships": [{"type": "受任", "target": "朱祐樘", "context": "朱祐樘弘治元年重新任命七十三岁的王恕为吏部尚书整顿官场"}, {"type": "同僚", "target": "马文升", "context": "王恕整顿吏部，马文升整顿兵部，两人共同奠定弘治盛世局面"}], "events": ["王恕马文升入朝整顿吏兵"], "source_chunks": [540, 541], "summary": "王恕是成化年间少数认真干事、敢于上奏批评的文臣，有“两京十二部，独有一王恕”的声望。成化年间朱见深嫌王恕奏疏烦扰，将王恕调往南京，后来又借马显退休之机让王恕一并退休。弘治元年，朱祐樘重新任命七十三岁的王恕为吏部尚书。王恕上任后考核官员，并建议增加午朝，使弘治初年吏治迅速转入整顿状态。"}, "马文升": {"aliases": [], "identity": "文臣", "secondary_identity": ["兵部尚书", "边臣", "尚书"], "era": ["成化", "弘治", "正德"], "roles": ["弘治兵部尚书", "兵政整顿者", "辽东边务承担者", "劝谏大臣", "正德初年离职尚书"], "relationships": [{"type": "受任", "target": "朱祐樘", "context": "朱祐樘召马文升入京担任兵部尚书，整顿军官和兵政积弊"}, {"type": "同僚", "target": "王恕", "context": "马文升与王恕分别整顿兵部和吏部，共同清理成化遗留废物"}, {"type": "旧怨", "target": "汪直", "context": "马文升在辽东替汪直挑衅边部收拾残局，后来被汪直怀恨降官"}, {"type": "劝谏", "target": "朱厚照", "context": "马文升为限制少年皇帝的荒嬉行为上书规劝朱厚照并表示会继续进言"}, {"type": "同盟", "target": "刘大夏", "context": "马文升与刘大夏先后上书劝朱厚照改正行为，二人随后都被罢去"}, {"type": "受害", "target": "刘瑾", "context": "朱厚照采纳刘瑾提醒后罢免马文升，马文升因此离职回家"}], "events": ["王恕马文升入朝整顿吏兵", "朱祐樘临终托孤", "朱厚照即位与刘健劝谏"], "source_chunks": [540, 541, 548, 549, 550], "summary": "马文升成化年间任兵部侍郎并长期处理辽东边务，经常替汪直挑衅边部后的烂摊子善后。汪直曾因马文升拒绝分享虚假军功而怀恨，后来借机降马文升官。朱祐樘继位后召马文升入京担任兵部尚书，马文升上任即罢免三十多名贪污军官，严厉整顿兵部。弘治后期马文升改任吏部尚书，并推荐刘大夏接任兵部，成为弘治盛世的重要支柱。正德初年，马文升在朱厚照即位后试图限制少年皇帝的荒嬉行为，马文升与刘大夏先后上书要求朱厚照采纳规劝并回到正道。朱厚照在刘瑾提醒下意识到可以命令大臣，随即罢免马文升，马文升伤心离职回家。"}, "刘健": {"aliases": [], "identity": "文臣", "secondary_identity": ["内阁阁臣", "内阁首辅"], "era": ["弘治", "正德"], "roles": ["弘治首辅重臣", "善断阁臣", "托孤阁臣", "内阁首辅", "八虎弹劾主导者", "正德初年辅政大臣"], "relationships": [{"type": "同僚", "target": "李东阳", "context": "刘健与李东阳、谢迁同在弘治旧内阁，正德初年共同面对刘瑾势力"}, {"type": "同僚", "target": "谢迁", "context": "刘健与谢迁同为朱祐樘倚重的弘治阁臣，并在朱祐樘临终时受托辅佐太子"}, {"type": "受托", "target": "朱祐樘", "context": "朱祐樘临终时将太子托付给刘健、李东阳和谢迁三位阁臣"}, {"type": "劝谏", "target": "朱厚照", "context": "刘健在朱厚照即位后上书列举不当行为，希望朱厚照停止游玩并专心理政"}, {"type": "对手", "target": "刘瑾", "context": "刘健发动六部九卿弹劾刘瑾等八虎，要求立即逮捕并处死这些宦官"}, {"type": "同盟", "target": "谢迁", "context": "刘健与谢迁在处置八虎问题上态度一致，失败后共同辞职离开朝廷"}, {"type": "联络", "target": "王岳", "context": "刘健利用王岳厌恶刘瑾的立场，安排王岳游说朱厚照批准捕杀八虎"}], "events": ["弘治三阁臣成局", "朱祐樘临终托孤", "朱厚照即位与刘健劝谏", "六部九卿弹劾八虎", "刘瑾逆转夺权"], "source_chunks": [542, 548, 549, 551, 552, 553], "summary": "刘健是弘治元年入阁的河南文臣，资格最老、脾气急躁，以善于判断和提前应对政局著称。刘健与李东阳、谢迁组成弘治三阁臣，刘健负责拍板决断，是弘治盛世内阁的重要支柱。弘治十八年朱祐樘临终时，刘健与李东阳、谢迁跪受托孤，承诺辅导年幼太子。朱厚照即位后，刘健首先上书规劝朱厚照停止游玩和危险行为，试图把少年皇帝拉回政务。刘健判断单靠内阁不足以除掉八虎，于是联合韩文和六部九卿，以李梦阳起草的奏折向朱厚照施压，要求立刻诛杀刘瑾等宦官。刘健在谈判中拒绝朱厚照延缓处置的要求，并与谢迁、韩文坚持必须杀掉八虎。王岳劝动朱厚照后，刘健原本计划次日动手，却因焦芳泄密和刘瑾连夜反击而失败。刘健随后与谢迁、李东阳一同请辞，刘健和谢迁获准离开，弘治旧内阁就此瓦解。"}, "李东阳": {"aliases": [], "identity": "文臣", "secondary_identity": ["内阁阁臣", "文坛领袖", "内阁大臣", "文学领袖"], "era": ["弘治", "正德"], "roles": ["弘治阁臣", "善谋阁臣", "茶陵派领袖", "内阁谋臣", "反刘瑾潜伏者", "弘治旧臣", "朝中营救者", "刘瑾倒台幕后布局者"], "relationships": [{"type": "同僚", "target": "刘健", "context": "李东阳与刘健同在弘治旧内阁，参与六部九卿弹劾八虎的行动"}, {"type": "同僚", "target": "谢迁", "context": "李东阳与谢迁同为内阁大臣，但李东阳在处死八虎问题上更谨慎"}, {"type": "处置", "target": "唐寅", "context": "唐寅会试作弊传闻上报后，李东阳判断事态严重并报告朱祐樘"}, {"type": "处置", "target": "程敏政", "context": "程敏政被牵涉入唐寅徐经科场案后，李东阳参与将事件上报并进入公事公办程序"}, {"type": "对手", "target": "刘瑾", "context": "李东阳并不同情刘瑾，李东阳判断刘瑾难以立即除掉，于是忍辱留朝并等待最终布局机会"}, {"type": "被出卖", "target": "焦芳", "context": "焦芳把内阁次日捕杀八虎的计划泄露给刘瑾，导致李东阳等人的行动失败"}, {"type": "同盟", "target": "杨廷和", "context": "李东阳阻止杨廷和当朝反对刘瑾整顿军屯，暗示应让刘瑾自行暴露漏洞"}, {"type": "师兄弟", "target": "杨一清", "context": "李东阳与杨一清少年时同在黎淳门下，杨一清下狱后李东阳出面营救并约定日后相召"}, {"type": "策应", "target": "张永", "context": "刘瑾被捕后，李东阳按杨一清安排拜会张永，推动六部六科和十三道御史集中弹劾"}], "events": ["弘治三阁臣成局", "唐寅徐经科场案", "朱祐樘临终托孤", "六部九卿弹劾八虎", "刘瑾逆转夺权", "刘瑾廷杖言官与贬谪王守仁", "李东阳忍辱营救旧臣", "杨一清下狱与镇江隐居", "刘瑾整顿军屯", "刘瑾伏诛与刘党清算", "李东阳退休"], "source_chunks": [542, 543, 544, 545, 548, 551, 552, 553, 554, 569, 570, 574, 575, 577, 578, 584, 585], "summary": "李东阳是弘治八年入阁的湖南文臣，在弘治三阁臣中以善谋著称。李东阳性格沉稳、谋略严密，内阁许多决策都出自李东阳筹划，与刘健之断、谢迁之侃共同构成弘治内阁高效格局。李东阳同时是文坛领袖，书法诗文名望极高，追随者形成茶陵派。弘治十二年唐寅、徐经科场案爆发后，李东阳意识到事件严重并报告朱祐樘，促使案件按朝廷程序审理。弘治十八年，李东阳与刘健、谢迁共同受朱祐樘托孤。正德初年六部九卿弹劾八虎时，李东阳参与内阁行动，却在是否必须处死八虎的问题上保持谨慎。刘瑾逆转夺权后，刘健与谢迁获准辞职，李东阳因焦芳说明会议中的犹豫态度而被留下。李东阳在刘瑾得势后忍辱留朝，一面躲避文字破绽追查，一面暗中营救刘健、谢迁、姚祥、张伟、方奎等遭报复官员。李东阳后来与杨廷和站到同一阵线，利用刘瑾整顿军屯引爆宁夏危机，又营救杨一清并安排杨一清隐居镇江等待时机。刘瑾被张永抓捕后，李东阳按杨一清布局拜会张永，组织六部六科和十三道御史同时弹劾刘瑾，促成刘瑾伏诛和刘党清算。正德七年，李东阳申请退休获准，杨廷和接替李东阳的位置，李东阳四年后在家乡去世。"}, "谢迁": {"aliases": [], "identity": "文臣", "secondary_identity": ["内阁阁臣", "状元", "内阁大臣"], "era": ["弘治", "正德"], "roles": ["弘治阁臣", "善辩阁臣", "托孤阁臣", "内阁大臣", "八虎弹劾支持者", "弘治旧臣"], "relationships": [{"type": "同僚", "target": "刘健", "context": "谢迁与刘健同在弘治内阁，刘健善断而谢迁善辩"}, {"type": "同僚", "target": "李东阳", "context": "谢迁与李东阳同为弘治旧内阁成员，但谢迁后来因李东阳未坚决主杀而失望离去"}, {"type": "受托", "target": "朱祐樘", "context": "朱祐樘临终时将太子托付给谢迁等三位阁臣"}, {"type": "同盟", "target": "刘健", "context": "谢迁与刘健共同要求处死八虎，在内阁会议和谈判中态度强硬"}, {"type": "对手", "target": "刘瑾", "context": "谢迁在六部九卿弹劾行动中主张杀掉刘瑾等八虎，失败后离开朝廷"}], "events": ["弘治三阁臣成局", "朱祐樘临终托孤", "六部九卿弹劾八虎", "刘瑾逆转夺权"], "source_chunks": [542, 548, 551, 552, 553], "summary": "谢迁是浙江余姚人，成化十一年状元，弘治八年入阁。谢迁在弘治三阁臣中资历最低但口才最好，承担内阁新闻发言人式的辩论角色。谢迁与刘健、李东阳通力合作，使弘治内阁在明代历史上仅次于三杨内阁。弘治十八年朱祐樘临终时，谢迁与刘健、李东阳共同受托辅佐太子。正德初年六部九卿弹劾八虎时，谢迁与刘健一样态度坚决，认为为国为民只能诛杀刘瑾等宦官。内阁讨论处置方针时，谢迁支持刘健与韩文的强硬路线，反对李东阳提出的疏远和驱逐方案。刘瑾连夜逆转局势后，谢迁与刘健、李东阳一同辞职，谢迁获准离开朝廷，并在送别宴上因李东阳此前的犹豫而与李东阳决裂。"}, "唐寅": {"aliases": ["唐伯虎"], "identity": "社会人员", "secondary_identity": ["举人", "才子"], "era": ["弘治"], "roles": ["吴中四才子", "应天府解元", "科场案受罚者"], "relationships": [{"type": "同行", "target": "徐经", "context": "唐寅进京会试途中与徐经同行，徐经出资供唐寅一路食宿"}, {"type": "被赏识", "target": "程敏政", "context": "程敏政曾看过唐寅乡试卷并欣赏唐寅文才，后又成为会试主考官"}, {"type": "被弹劾牵连", "target": "华眿", "context": "华眿将科场传闻上奏为程敏政泄题案，唐寅因此被捕入狱"}], "events": ["唐寅乡试夺解元", "唐寅徐经科场案"], "source_chunks": [543, 544, 545, 546, 547], "summary": "唐寅，字伯虎，是江苏吴县才子，与祝枝山、文征明、徐祯卿合称吴中四才子。唐寅早年自恃天才而放纵，后经祝枝山劝告闭门苦读。弘治十一年，唐寅参加南京应天府乡试并夺得解元。弘治十二年，唐寅与徐经同行进京会试，因考后放言自己必为会元，又与徐经同答出极难题目，被卷入程敏政泄题案。案件审理后，唐寅被贬为小吏且不得为官，功名道路断绝，随后转入浪子才子式人生。"}, "程敏政": {"aliases": [], "identity": "文臣", "secondary_identity": ["礼部右侍郎", "会试主考官"], "era": ["弘治"], "roles": ["会试主考官", "科场案涉案官员"], "relationships": [{"type": "赏识", "target": "唐寅", "context": "程敏政曾看过梁储保留的唐寅乡试卷，对唐寅文章印象深刻"}, {"type": "涉案", "target": "徐经", "context": "徐经被认定通过程敏政仆人购买考题，程敏政因此承担失察责任"}, {"type": "被弹劾", "target": "华眿", "context": "华眿上奏指控程敏政泄露考题，迫使案件进入公开审理程序"}], "events": ["唐寅徐经科场案"], "source_chunks": [543, 544, 545, 546, 547], "summary": "程敏政是礼部右侍郎，小时候有神童名声，并因娶李贤之女仕途顺利。弘治十一年，程敏政看过梁储保留的唐寅乡试卷并赏识唐寅文才。弘治十二年，程敏政担任会试主考官，因唐寅和徐经答出极难题目、唐寅又提前自称会元，引发泄题传闻。案件审理后，程敏政被认定合谋作弊无实据，但因仆人卖题给徐经而负失察责任，被勒令退休，回家不久去世。"}, "徐经": {"aliases": [], "identity": "社会人员", "secondary_identity": ["举人", "富家子"], "era": ["弘治"], "roles": ["科场案涉案者", "唐寅同行者"], "relationships": [{"type": "同行", "target": "唐寅", "context": "徐经在进京赶考途中结识唐寅，出资与唐寅同行并共同参加会试"}, {"type": "涉案", "target": "程敏政", "context": "徐经被认定购买程敏政仆人泄露的考题，导致程敏政承担失察责任"}, {"type": "被告发牵连", "target": "华眿", "context": "华眿弹劾程敏政泄题后，徐经与唐寅、程敏政一同被捕审理"}], "events": ["唐寅徐经科场案"], "source_chunks": [544, 545, 546, 547], "summary": "徐经是江阴富家举人，在进京会试途中结识唐寅，并出资供唐寅一路同行。弘治十二年会试中，徐经与唐寅都答出极难题目，随后因唐寅酒后放言必为会元而引发作弊传闻。案件审理后，徐经被认定购买程敏政仆人泄露的考题，受到贬为小吏、不得为官的处分。徐经回乡后厌恶科举，后世子孙徐霞客也走上与科举不同的人生道路。"}, "华眿": {"aliases": ["华太师原型"], "identity": "文臣", "secondary_identity": ["给事中"], "era": ["弘治"], "roles": ["科场案告发者"], "relationships": [{"type": "弹劾", "target": "程敏政", "context": "华眿将唐寅徐经会试传闻上奏为程敏政泄露考题案"}, {"type": "牵连", "target": "唐寅", "context": "华眿弹劾使唐寅从会元热门转为被捕涉案考生"}, {"type": "牵连", "target": "徐经", "context": "华眿弹劾使徐经购买考题的传闻进入朝廷审理程序"}], "events": ["唐寅徐经科场案"], "source_chunks": [545, 547], "summary": "华眿是弘治十二年唐寅徐经科场案中的给事中告发者。唐寅酒后放言必为会元、唐寅和徐经又答出极难题目后，华眿将矛头指向程敏政，指控程敏政事先出卖考题。案件审理后，华眿被认定胡乱告状、所言不实而被贬官，但华眿的告发使唐寅、徐经和程敏政全部被卷入案件。后世戏曲《三笑》《唐伯虎点秋香》以华眿为原型创作华太师形象。"}, "朱厚照": {"aliases": ["明武宗", "朱寿", "总督军务威武大将军总兵官", "正德皇帝", "威武大将军"], "identity": "皇帝", "secondary_identity": ["太子", "明朝皇帝", "军事统帅"], "era": ["弘治", "正德"], "roles": ["正德皇帝", "八虎庇护者", "刘瑾专权纵容者", "杨廷和复召者", "张永夜奏裁决者", "应州之战明军统帅", "南巡风波主角", "南征发起者", "江南巡游皇帝", "江彬庇护者", "南京献俘表演者", "无嗣驾崩皇帝"], "relationships": [{"type": "父子", "target": "朱祐樘", "context": "朱祐樘去世前唯一成年的儿子是朱厚照，朱厚照由太子继位为新皇帝"}, {"type": "宠信", "target": "刘瑾", "context": "朱厚照厌烦文官劝谏，长期信任迎合玩乐需求的刘瑾，并允许刘瑾代管奏章和朝政"}, {"type": "受劝", "target": "刘健", "context": "刘健多次上书劝朱厚照停止游玩并专心理政，朱厚照表面答应却继续荒嬉"}, {"type": "免职", "target": "马文升", "context": "马文升劝谏朱厚照约束行为后，朱厚照听从刘瑾意见将马文升罢去"}, {"type": "免职", "target": "刘大夏", "context": "刘大夏与马文升共同上书规劝朱厚照，朱厚照随即下令让刘大夏离职归乡"}, {"type": "召回", "target": "杨廷和", "context": "朱厚照在退朝时想起杨廷和，责令刘瑾把被贬南京的杨廷和召回内阁"}, {"type": "信任", "target": "张永", "context": "张永平定宁夏后回京进见，朱厚照设宴款待张永并最终听信张永死谏" 正德朝极早入阁的文臣。杨廷和二十岁入翰林，三十二岁任经筵讲官，四十三岁成为大学士，正德二年刘健和谢迁离朝后正式进入内阁并为朱厚照代写诏令。杨廷和给朱厚照讲课时以远离小人、亲近贤臣讽刺刘瑾，被刘瑾调往南京户部侍郎；朱厚照随后因想起杨师傅而责令召回杨廷和，刘瑾从此不敢轻易动杨廷和。杨廷和回朝后转向李东阳一边，参与等待和筹备除掉刘瑾，李东阳正德七年退休后，杨廷和接替李东阳的位置。杨廷和守制离京后，朱厚照失去主要约束，出关和巡游行为明显加剧。正德十四年朱厚照欲南巡，杨廷和率先上书劝阻，引发六科、十三道和各级官员集体反对，最终酿成午门罚跪与廷杖风波。朱宸濠筹备叛乱时，杨廷和曾接受朱宸濠馈赠，对朱宸濠结交朝臣的行为没有及时追究；宁王问题暴露后，杨廷和试图通过派使者警告朱宸濠把事情压小，却低估朱宸濠和刘养正的心理承受能力。朱厚照决定南征宁王时，大臣推举杨廷和出面劝阻，杨廷和看出朱厚照决心已定，只能担任京城留守工作。朱厚照去世后，杨廷和立即处理皇位继承和江彬威胁，提出以兴献王之子朱厚熜继承皇位，随后解散朱厚照组建且由江彬操纵的团营，命张永、郭勋等控制京城防务，再以宫中祭奠仪式诱捕江彬。嘉靖元年，杨廷和压制王守仁入京，把王守仁调往南京兵部尚书，显示出杨廷和心胸狭窄和擅权的一面。杨廷和拥立朱厚熜时以为少年皇帝容易控制，却为后来失势埋下伏笔。"}, "杨一清": {"aliases": [], "identity": "文臣", "secondary_identity": ["边臣", "三边总制", "户部尚书", "吏部尚书", "重臣"], "era": ["正德"], "roles": ["三边总制", "宁夏平乱调度者", "除刘瑾谋划者", "边防重臣", "王守仁提携者", "正德重臣"], "relationships": [{"type": "对手", "target": "刘瑾", "context": "杨一清拒绝投靠刘瑾，后在宁夏借张永之手完成除掉刘瑾的布局"}, {"type": "师兄弟", "target": "李东阳", "context": "杨一清少年时与李东阳同师黎淳，下狱后获李东阳营救并按约定隐居等待时机"}, {"type": "试探", "target": "张永", "context": "杨一清在宁夏观察张永约束军纪和反刘瑾态度后，判断张永可以争取"}, {"type": "离间", "target": "张彩", "context": "杨一清辞职时推荐张彩接替三边总制，使刘瑾对张彩产生疑心"}, {"type": "平叛对象", "target": "朱寘鐇", "context": "安化王朱寘鐇叛乱后，杨一清被起复为三边总制前往宁夏处置军情"}, {"type": "提携", "target": "王守仁", "context": "杨一清见过王守仁后判断王守仁是能挑大梁的奇才，因此长期关注并提拔王守仁"}], "events": ["杨一清下狱与镇江隐居", "安化王之乱", "杨一清张永宁夏密谋除刘瑾", "张永夜奏刘瑾", "刘瑾伏诛与刘党清算", "王守仁江西剿匪"], "source_chunks": [573, 574, 576, 577, 578, 579, 580, 581, 584, 599, 600], "summary": "杨一清，正德朝边防重臣，曾任右都御史和三边总制，管理甘肃、宁夏、延绥等边地。杨一清守边、养马、修长城都很有能力，刘瑾试图拉拢杨一清被严辞拒绝。杨一清处理宁夏长城工程中的兵工骚动后被刘瑾借机攻击，辞职时故意推荐张彩接替三边总制，成功在刘瑾和张彩之间制造疑心。正德三年，刘瑾以贪污军饷为名把杨一清关入监狱，李东阳凭同门旧谊出面营救，杨一清获释后按李东阳安排隐居镇江。刘瑾整顿军屯引发安化王朱寘鐇叛乱后，杨一清被起复为三边总制赴宁夏，虽然仇钺已平定叛乱，杨一清仍与监军张永相遇。杨一清观察张永安民、严禁军队扰民后判断张永可以争取，正德五年七月在送别宴上摊牌，以刘瑾为朝廷内贼说动张永，并给张永准备列有十七条罪状的文书。刘瑾被捕后，杨一清预先安排李东阳策应张永，刘瑾伏诛后杨一清被调入中央，先任户部尚书，后任吏部尚书。杨一清后来见过王守仁，凭多年官场经验判断王守仁是难得奇才，因而长期关注并提拔王守仁。朱宸濠经营朝中关系时，杨一清也被旁及提到为曾通过写字和墓志铭获得额外收入的重臣，但杨一清在相关阶段的关键作用仍是促成王守仁仕途复起。"}, "张彩": {"aliases": [], "identity": "文臣", "secondary_identity": ["刘瑾谋士"], "era": ["正德"], "roles": ["刘瑾军师", "刘党核心谋士", "杨  "钱宁，正德年间朱厚照身边的宦官宠臣和权奸。刘瑾死后，钱宁凭借迎合朱厚照游乐需求取得宠信，参与朱厚照豹房和出行活动。朱宸濠谋反筹备期间，钱宁收受朱宸濠财物，帮助朱宸濠恢复宁王护卫，使朱宸濠重新获得招兵指标。宁王叛乱前，钱宁因朱宸濠关系与江彬政争相连，江彬借宁王问题攻击钱宁，间接刺激朝廷警告朱宸濠并促成叛乱提前爆发。宁王兵败后，钱宁担心朱宸濠供出受贿细节，随朱厚照南征途中陷入恐惧。江彬借调虎离山之计建议朱厚照让钱宁回京，又派人前往江西搜集钱宁勾结藩王的证据。钱宁很快被捕抄家，成为刘瑾之后又一个倒台的大权奸。"}, "江彬": {"aliases": ["江都督", "江指挥", "威武副将军"], "identity": "明朝武将", "secondary_identity": ["宠臣", "锦衣卫指挥使", "东厂掌控者", "权奸"], "era": ["正德"], "roles": ["朱厚照近臣", "北巡随从武官", "应州之战参谋", "朱厚照宠臣", "钱宁政敌", "南征阴谋策划者", "王守仁政敌", "京军操纵者", "正德末权奸"], "relationships": [{"type": "护卫", "target": "朱厚照", "context": "江彬曾在朱厚照玩虎遇险时挡住老虎，随后成为朱厚照亲近的武官"}, {"type": "建议", "target": "朱厚照", "context": "江彬参与提议朱厚照夜奔出关，并在应州战前提醒王勋兵力不足"}, {"type": "攻击", "target": "钱宁", "context": "江彬与钱宁争宠后决定借宁王问题攻击钱宁，迫使朝廷介入朱宸濠异动"}, {"type": "间接逼迫", "target": "朱宸濠", "context": "江彬围绕宁王问题做文章，导致朝廷派使者警告朱宸濠并刺激朱宸濠提前起兵"}, {"type": "蒙蔽", "target": "朱厚照", "context": "江彬藏匿王守仁捷报并推动朱厚照南征，借皇帝离京寻找夺权和谋害机会"}, {"type": "陷害", "target": "王守仁", "context": "江彬因王守仁平叛夺去风头，先后造谣、夺俘、派张忠入江西挑衅，企图整倒王守仁"}, {"type": "清除", "target": "钱宁", "context": "江彬借朱宸濠案证据推动钱宁回京被捕，使朱厚照身边旧权奸倒台"}, {"type": "派遣", "target": "张忠", "context": "江彬派张忠率京军进入江西，搜罗王守仁勾结叛乱的口供并挑起事端"}, {"type": "忌惮", "target": "张永", "context": "江彬得知张永护持王守仁和乔宇后不敢公开撕破脸，只能改用迂回陷害手段"}, {"type": "谋害嫌疑", "target": "朱厚照", "context": "牛首山失踪和清江浦落水均发生在江彬护卫体系控制下，文本将其视为江彬阴谋链条的一部分"}, {"type": "被清除", "target": "杨廷和", "context": "朱厚照去世后杨廷和先解散团营、控制京城防务，再设计宫中仪式诱捕江彬"}, {"type": "被诱捕", "target": "张永", "context": "江彬入宫后被张永拖入饭局名义的陷阱，逃跑失败后被太监追捕"}], "events": ["朱厚照夜奔居庸关", "应州之战", "宁王起兵杀孙燧许逵", "朱厚照南征宁王", "钱宁下狱", "江西京军之乱", "南京城门钥匙危机", "牛首山失踪事件", "清江浦落水", "朱厚照去世", "江彬被捕"], "source_chunks": [588, 590, 593, 594, 596, 610, 633, 634, 636, 638, 639, 642, 643, 644, 647, 650, 651, 652, 653, 660, 661], "summary": "江彬，正德年间武将出身的朱厚照宠臣和正德后期权奸。江彬因在虎患中保护朱厚照而取得信任，并参与提议朱厚照夜奔出关。应州战前，江彬随侍朱厚照左右，对王勋主动迎击小王子的命令提出兵力不足的疑虑。宁王叛乱前，江彬因与钱宁争宠，抓住朱宸濠与钱宁关系密切这一破绽做文章，推动朝廷对宁王问题产生警觉。朱厚照南征宁王时，江彬压下王守仁捷报，推动朱厚照离京，并借朱宸濠案清除钱宁。江彬沿途仗势勒索地方官民，假传旨意，甚至让成国公朱辅下跪，表现出锦衣卫指挥使兼东厂掌控者的骄横。江彬因王守仁平叛夺功而把王守仁视为新敌，先阻挠献俘南京，又派锦衣卫和张忠夺俘、造谣、搜证、扰乱江西。江彬在南京索取城门钥匙未果后暴露谋反迹象，遭乔宇和张永监视。江彬后来利用护卫体系制造牛首山失踪疑云，试探谋害朱厚照后的政治反应，但王守仁、张永、乔宇以军事声势迫使江彬放出朱厚照。朱厚照返京途中在清江浦落水后迅速衰弱，文本把清江浦落水与南京城门钥匙、牛首山失踪一起放入江彬阴谋疑云之中。朱厚照去世后，江彬失去皇帝庇护，杨廷和解散团营并控制京城防务。江彬被诱入宫中后试图逃跑，最终在西安门、北安门之间被追上抓获，正德末最后一个权奸倒台。"}, "张钦": {"aliases": [], "identity": "文臣", "secondary_identity": ["御史"], "era": ["正德"], "roles": ["居庸关巡守御史", "阻止朱厚照出关者"], "relationships": [{"type": "阻拦", "target": "朱厚照", "context": "张钦拒绝朱厚照开关出塞的命令，以防皇帝遭遇蒙古兵重演土木之变"}, {"type": "协同", "target": "梁储", "context": "张钦在居庸关前方坚决不开关，梁储随后从京城追来劝朱厚照回去"}], "events": ["朱厚照夜奔居庸关"], "source_chunks": [588, 589, 590], "summary": "张钦，正德十二年居庸关巡守御史。朱厚照第一次夜奔出关时，张钦识破开关可能造成的巨大风险，坚决拒绝皇帝放行命令。张钦手持利剑坐镇关口，斥退镇守太监刘嵩和朱厚照使者，以出关者格杀勿论的强硬姿态迫使朱厚照无法出塞。"}, "梁储": {"aliases": [], "identity": "文臣", "secondary_identity": ["内阁大臣"], "era": ["正德"], "roles": ["追劝朱厚照大臣", "正德内阁成员"], "relationships": [{"type": "追劝", "target": "朱厚照", "context": "梁储得知朱厚照夜奔后与蒋冕快马追赶，在居庸关劝朱厚照回京"}, {"type": "同僚", "target": "蒋冕", "context": "梁储与蒋冕共同追赶夜奔出关的朱厚照，两人一起承担皇帝出事的政治风险"}], "events": ["朱厚照夜奔居庸关"], "source_chunks": [588, 589, 590], "summary": "梁储，正德年间内阁大臣。朱厚照第一次夜奔居庸关后，梁储与蒋冕获知皇帝离宫，立即备马追赶。梁储赶到关前后确认朱厚照无恙，并与蒋冕下跪苦劝朱厚照回京。"}, "蒋冕": {"aliases": [], "identity": "文臣", "secondary_identity": ["内阁大臣"], "era": ["正德"], "roles": ["追劝朱厚照大臣", "正德内阁成员"], "relationships": [{"type": "追劝", "target": "朱厚照", "context": "蒋冕与梁储在朱厚照第一次夜奔后赶往居庸关，劝皇帝返回京城"}, {"type": "同僚", "target": "梁储", "context": "蒋冕与梁储共同应对朱厚照夜奔出关危机，二人连续两次追赶皇帝"}], "events": ["朱厚照夜奔居庸关"], "source_chunks": [588, 589, 590], "summary": "蒋冕，正德年间内阁大臣。朱厚照第一次夜奔居庸关时，蒋冕与梁储一同追赶，赶到后苦劝朱厚照回京。朱厚照第二次出关后，蒋冕再度发现皇帝逃离，但因朱厚照已安排谷大用守关，蒋冕与梁储只能望关兴叹。"}, "小王子": {"aliases": ["鞑靼小王子"], "identity": "外国", "secondary_identity": ["鞑靼首领", "蒙古军事统帅"], "era": ["正德"], "roles": ["明朝北边强敌", "应州之战蒙古统帅"], "relationships": [{"type": "对手", "target": "朱厚照", "context": "小王子长期侵扰明朝边境，朱厚照正是为与小王子较量而执意出关"}, {"type": "交战", "target": "王勋", "context": "应州之战初期小王子率主力围攻王勋部，试图在援军到来前消灭明军"}], "events": ["应州之战"], "source_chunks": [591, 592, 593, 594, 595, 596], "summary": "小王子，正德年间鞑靼部落的     body += '<div class="d-sec"><div class="d-sec-lbl">历史身份</div><div class="d-pills">';
    body += d.secondary_identity.map(s =>
      `<span class="dp" style="background:rgba(154,140,122,0.14);color:#5A4C3C;">${s}</span>`
    ).join('');
    body += '</div></div>';
  }
  if (d.roles?.length) {
    body += '<div class="d-sec"><div class="d-sec-lbl">职能角色</div><div class="d-pills">';
    body += d.roles.map(r =>
      `<span class="dp" style="background:rgba(74,140,120,0.14);color:#2E6E58;">${r}</span>`
    ).join('');
    body += '</div></div>';
  }
  if (d.era?.length) {
    body += '<div class="d-sec"><div class="d-sec-lbl">活跃年号</div><div class="d-pills">';
    body += d.era.map(e =>
      `<span class="dp" style="background:rgba(139,127,184,0.14);color:#5C4E8C;">${e}</span>`
    ).join('');
    body += '</div></div>';
  }
  if (d.relationships?.length) {
    body += '<div class="d-sec"><div class="d-sec-lbl">关系</div><table class="rel-tbl">';
    for (const r of d.relationships)
      body += `<tr><td>${r.type||''}</td><td>${r.target||''}</td><td>${r.context||''}</td></tr>`;
    body += '</table></div>';
  }
  if (d.events?.length) {
    body += '<div class="d-sec"><div class="d-sec-lbl">参与事件</div><div class="d-pills">';
    body += d.events.map(e =>
      `<span class="dp" style="background:rgba(92,127,175,0.14);color:#3A5E8C;">${e}</span>`
    ).join('');
    body += '</div></div>';
  }
  if (d.summary) {
    body += '<div class="d-sec"><div class="d-sec-lbl">人物简述</div>';
    body += `<div class="d-summary">${d.summary}</div></div>`;
  }
  if (d.source_chunks?.length) {
    body += `<div class="d-sec"><div class="d-sec-lbl">来源 Chunks</div>`;
    body += `<div style="font-family:'JetBrains Mono',monospace;font-size:8.5px;color:rgba(28,22,16,0.38);letter-spacing:0.06em;">${d.source_chunks.join('  ·  ')}</div></div>`;
  }
  document.getElementById('d-body').innerHTML = body;
  document.getElementById('drawer').classList.add('open');
}
function close_drawer() { document.getElementById('drawer').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') close_drawer(); });

// ── Era 过滤 Pills ────────────────────────────────────────────────────────────
const active_eras = new Set();
ALL_ERAS.forEach(era => {
  const pill = document.createElement('span');
  pill.className = 'era-pill'; pill.textContent = era;
  pill.onclick = () => {
    if (active_eras.has(era)) { active_eras.delete(era); pill.classList.remove('active'); }
    else                      { active_eras.add(era);    pill.classList.add('active'); }
    apply_filters();
  };
  document.getElementById('era-pills').appendChild(pill);
});

// ── D3 图谱 ───────────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#graph').attr('width', W).attr('height', H);

// 画布底色 + 森林点阵纹理
svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#EAE6DC');
const DOT = 30;
for (let x = 0; x < W; x += DOT)
  for (let y = 0; y < H; y += DOT)
    svg.append('circle').attr('cx', x).attr('cy', y).attr('r', 0.8)
      .attr('fill', 'rgba(28,26,18,0.055)').attr('pointer-events', 'none');

// 箭头 markers — 暗色系
['arr','arr-hi'].forEach((id, i) => {
  svg.append('defs').append('marker')
    .attr('id', id).attr('viewBox','0 -5 10 10')
    .attr('refX', 24).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient','auto')
    .append('path').attr('d','M0,-5L10,0L0,5')
    .attr('fill', i===0 ? 'rgba(28,22,16,0.20)' : 'rgba(28,22,16,0.62)');
});

const canvas = svg.append('g').attr('id','canvas');

// zoom / pan
const zoom = d3.zoom().scaleExtent([0.03, 18])
  .on('zoom', ev => {
    canvas.attr('transform', ev.transform);
  });
svg.call(zoom).on('dblclick.zoom', null);

const nodes = RAW_NODES.map(d => ({...d}));
const links = RAW_LINKS.map(d => ({...d}));

// 动态 force 参数
const n       = nodes.length;
const charge  = -Math.max(60,  Math.min(520, 18000 / n));
const link_d  =  Math.max(55,  Math.min(200, 10000 / Math.sqrt(n)));
const collide =  Math.max(16,  Math.min(70,  65000 / (n * n)));

const sim = d3.forceSimulation(nodes)
  .force('link',      d3.forceLink(links).id(d => d.id).distance(link_d).strength(0.30))
  .force('charge',    d3.forceManyBody().strength(charge))
  .force('center',    d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide().radius(d => d.r + collide))
  .alphaDecay(0.022);

// 渲染边
const edge = canvas.append('g').selectAll('line').data(links).join('line')
  .attr('class','edge').attr('marker-end','url(#arr)');

// 边 tooltip
const tip = document.getElementById('edge-tip');
edge.on('mousemove', (ev, d) => {
    tip.style.display = 'block';
    tip.style.left = (ev.clientX + 14) + 'px';
    tip.style.top  = (ev.clientY - 6)  + 'px';
    tip.textContent = `${d.type}：${d.context}`;
  })
  .on('mouseleave', () => { tip.style.display = 'none'; });

// 渲染节点 group（可拖拽）
const node = canvas.append('g').selectAll('g').data(nodes).join('g')
  .call(d3.drag()
    .on('start', (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (ev, d) => { d.fx=ev.x; d.fy=ev.y; })
    .on('end',   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  );

node.append('circle').attr('class','node-circle')
  .attr('r', d => d.r).attr('fill', d => d.color);

// 节点标签 — 深色，浅色画布上清晰可见
node.append('text').attr('class','node-label').text(d => d.id)
  .attr('dy', d => d.r + 11)
  .style('font-size', d => Math.max(7.5, Math.min(10.5, d.r * 0.88)) + 'px');

// hover：高亮邻居，淡化其余
node.on('mouseover', (ev, hov) => {
    const nbrs = new Set([hov.id]);
    links.forEach(l => {
      const s = l.source.id||l.source, t = l.target.id||l.target;
      if (s===hov.id||t===hov.id) { nbrs.add(s); nbrs.add(t); }
    });
    node.selectAll('circle').classed('dim', d => !nbrs.has(d.id));
    node.selectAll('text').classed('dim',   d => !nbrs.has(d.id));
    edge.classed('hi',  d => { const s=d.source.id||d.source,t=d.target.id||d.target; return s===hov.id||t===hov.id; })
        .classed('dim', d => { const s=d.source.id||d.source,t=d.target.id||d.target; return s!==hov.id&&t!==hov.id; })
        .attr('marker-end', d => {
          const s=d.source.id||d.source, t=d.target.id||d.target;
          return (s===hov.id||t===hov.id) ? 'url(#arr-hi)' : 'url(#arr)';
        });
  })
  .on('mouseout', () => {
    node.selectAll('circle').classed('dim', false);
    node.selectAll('text').classed('dim', false);
    edge.classed('hi', false).classed('dim', false).attr('marker-end', 'url(#arr)');
  })
  .on('click', (ev, d) => { ev.stopPropagation(); open_drawer(d.id); });

svg.on('click', () => close_drawer());

sim.on('tick', () => {
  edge.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// 页面载入时一次性设定初始视角，不绑定仿真事件，不打断用户拖拽
const init_scale = Math.min(0.86, 7 / Math.sqrt(nodes.length));
svg.call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(init_scale));

// ── 最佳布局：重置手动拖拽，从圆形均匀分布重新退火 ──────────────────────────
function best_layout() {
  const r0 = Math.min(W, H) * 0.36;

  // 释放所有固定节点，初始位置均匀排布在圆上，给 force 一个好的起点
  nodes.forEach((d, i) => {
    d.fx = null; d.fy = null;
    const angle = (2 * Math.PI * i) / nodes.length;
    d.x  = W/2 + r0 * Math.cos(angle);
    d.y  = H/2 + r0 * Math.sin(angle);
    d.vx = 0; d.vy = 0;
  });

  // 以高 alpha 重新退火，让 force 充分弛豫到低重叠态
  sim.alpha(1).alphaTarget(0).restart();
}

// ── 搜索 + 过滤 ───────────────────────────────────────────────────────────────
let search_q = '';
document.getElementById('search-input').addEventListener('input', e => {
  search_q = e.target.value.trim().toLowerCase(); apply_filters();
});
document.getElementById('reset-btn').addEventListener('click', () => {
  search_q = ''; document.getElementById('search-input').value = '';
  active_eras.clear();
  document.querySelectorAll('.era-pill').forEach(p => p.classList.remove('active'));
  apply_filters();
});

function node_passes(d) {
  if (search_q) {
    const dd = DRAWER_DATA[d.id];
    const hit = d.id.toLowerCase().includes(search_q) ||
      (dd?.aliases||[]).some(a => a.toLowerCase().includes(search_q));
    if (!hit) return false;
  }
  if (active_eras.size > 0 && !(d.era||[]).some(e => active_eras.has(e))) return false;
  return true;
}
function apply_filters() {
  const on = search_q || active_eras.size > 0;
  node.selectAll('circle').style('opacity', d => on ? (node_passes(d) ? 1 : 0.06) : 1);
  node.selectAll('text').style('opacity',   d => on ? (node_passes(d) ? 1 : 0.04) : null);
  edge.style('opacity', d => {
    if (!on) return null;
    const sn = nodes.find(x => x.id===(d.source.id||d.source));
    const tn = nodes.find(x => x.id===(d.target.id||d.target));
    return (sn&&tn&&node_passes(sn)&&node_passes(tn)) ? 0.5 : 0.03;
  });
}

// ── 动态图例 ──────────────────────────────────────────────────────────────────
const legend_el = document.getElementById('legend');
const seen_id = {};
nodes.forEach(nd => {
  if (!seen_id[nd.identity]) {
    seen_id[nd.identity] = true;
    const row = document.createElement('div'); row.className = 'leg';
    row.innerHTML = `<div class="leg-d" style="background:${nd.color}"></div>
                     <span class="leg-label">${nd.identity}</span>`;
    legend_el.appendChild(row);
  }
});
</script>
</body>
